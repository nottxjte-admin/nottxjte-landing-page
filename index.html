<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOTtxJTE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <a href="/">NOTtxJTE</a>
      </div>
      <nav class="main-nav" aria-label="Main Navigation">
        <button class="menu-toggle" aria-expanded="false" aria-controls="nav-list">
          <span class="sr-only">Menu</span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
        <ul id="nav-list" class="nav-list">
          <li><a href="#features">Features</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="site-content">
    <div class="container">
      <section id="contact" class="contact-section">
        <h2>Contact Us</h2>
        <form id="contact-form" class="contact-form" novalidate>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required aria-required="true">
            <div class="error-message" id="name-error"></div>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required aria-required="true">
            <div class="error-message" id="email-error"></div>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required aria-required="true">
            <div class="error-message" id="subject-error"></div>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required aria-required="true"></textarea>
            <div class="error-message" id="message-error"></div>
          </div>
          <button type="submit" class="submit-button">Send Message</button>
        </form>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-nav">
        <ul>
          <li><a href="/privacy">Privacy Policy</a></li>
          <li><a href="/terms">Terms of Service</a></li>
        </ul>
      </div>
      <div class="copyright">
        &copy; 2026 NOTtxJTE. All rights reserved.
      </div>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
